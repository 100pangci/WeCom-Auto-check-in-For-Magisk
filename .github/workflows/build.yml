name: Build and Release Magisk Module

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Magisk zip
        run: |
          zip -r auto_check_in_magisk.zip module.prop service.sh README.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: auto_check_in_magisk.zip
          name: ${{ github.ref_name }}
          body: Auto-generated Magisk module release for tag ${{ github.ref_name }}
