name: Build and Release Magisk Module

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set executable bit
        run: |
          chmod +x service.sh

      - name: Build unsigned Magisk zip
        run: |
          mkdir -p build
          zip -r build/auto_check_in_magisk.zip module.prop service.sh README.md

      - name: Create GitHub release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          body: Auto-generated Magisk module release for tag ${{ github.ref_name }}
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: build/auto_check_in_magisk.zip
          asset_name: auto_check_in_magisk.zip
          asset_content_type: application/zip
          token: ${{ secrets.GITHUB_TOKEN }}
